services:
  postgres:
    image: postgres:16
    container_name: cleartrack-postgres
    environment:
      POSTGRES_DB: cleartrack_db
      POSTGRES_USER: cleartrack_user
      POSTGRES_PASSWORD: cleartrack_pass
    ports:
      - "5432:5432"
    volumes:
      - cleartrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleartrack_user -d cleartrack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cleartrack_pgdata: