spring:
  application:
    name: cleartrack

  datasource:
    url: jdbc:postgresql://localhost:5432/cleartrack_db
    username: cleartrack_user
    password: cleartrack_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080